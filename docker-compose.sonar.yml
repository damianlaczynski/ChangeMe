# SonarQube code quality — npm run sonar:* (see docs/technical/sonar-analysis.md)
# Merge with app stack: docker compose -f docker-compose.yml -f docker-compose.sonar.yml ...
services:
  sonarqube-db:
    profiles:
      - sonar
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sonarqube:
    profiles:
      - sonar
    image: sonarqube:community
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9000/api/system/status | grep -q ''"status":"UP"''',
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  sonar-frontend:
    profiles:
      - sonar
    image: sonarsource/sonar-scanner-cli:latest
    depends_on:
      sonarqube:
        condition: service_healthy
    working_dir: /repo/src/ChangeMe.Frontend
    volumes:
      - .:/repo
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    networks:
      - app-network
    entrypoint: ["/bin/sh", "/repo/scripts/sonar/frontend.sh"]

  sonar-backend:
    profiles:
      - sonar
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on:
      sonarqube:
        condition: service_healthy
    working_dir: /repo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
      DOCKER_HOST: unix:///var/run/docker.sock
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
    networks:
      - app-network
    entrypoint: ["/bin/sh", "/repo/scripts/sonar/backend.sh"]

networks:
  app-network:
    driver: bridge

volumes:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
