services:
  frontend:
    build:
      context: .
      dockerfile: src/ChangeMe.Frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/ChangeMe.Backend/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - mailhog
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=ChangeMe;Username=postgres;Password=postgres
      - FileStorageOptions__RootPath=/app/storage
    volumes:
      - file-storage-data:/app/storage
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ChangeMe
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network
    restart: unless-stopped

  # Run: docker compose --profile test run --rm backend-tests
  backend-tests:
    profiles:
      - test
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /repo/src/ChangeMe.Backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
    command: dotnet test ChangeMe.Backend.slnx -c Release

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  file-storage-data:
