# Security and code analysis — npm run analyze:* (see docs/technical/security-analysis.md)
# Merge with app stack: docker compose -f docker-compose.yml -f docker-compose.analyze.yml ...
services:
  sonarqube-db:
    profiles:
      - security
      - analyze
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sonarqube:
    profiles:
      - security
      - analyze
    image: sonarqube:community
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9000/api/system/status | grep -q ''"status":"UP"''',
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  sonar-frontend:
    profiles:
      - security
      - analyze
    image: sonarsource/sonar-scanner-cli:latest
    depends_on:
      sonarqube:
        condition: service_healthy
    working_dir: /repo/src/ChangeMe.Frontend
    volumes:
      - .:/repo
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    entrypoint: ["/bin/sh", "/repo/scripts/analyze/sonar-frontend.sh"]
    networks:
      - app-network

  sonar-backend:
    profiles:
      - security
      - analyze
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on:
      sonarqube:
        condition: service_healthy
    working_dir: /repo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
      DOCKER_HOST: unix:///var/run/docker.sock
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
    entrypoint: ["/bin/sh", "/repo/scripts/analyze/sonar-backend.sh"]
    networks:
      - app-network

  trivy-fs:
    profiles:
      - security
      - analyze
    image: aquasec/trivy:latest
    working_dir: /repo
    volumes:
      - .:/repo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /repo/artifacts/trivy
        trivy fs --scanners vuln --timeout 15m --severity HIGH,CRITICAL --ignore-unfixed \
          --skip-dirs node_modules,bin,obj,.git,artifacts,.template-test,.template-test-output,coverage,playwright-report,test-results \
          --format json --output /repo/artifacts/trivy/fs-report.json /repo
        trivy fs --scanners vuln --timeout 15m --severity HIGH,CRITICAL --ignore-unfixed \
          --skip-dirs node_modules,bin,obj,.git,artifacts,.template-test,.template-test-output,coverage,playwright-report,test-results \
          --format table --output /repo/artifacts/trivy/fs-report.txt /repo
        echo "Wrote artifacts/trivy/fs-report.json and fs-report.txt"

  trivy-images:
    profiles:
      - security
      - analyze
    image: aquasec/trivy:latest
    volumes:
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /repo/artifacts/trivy
        for img in changeme-frontend changeme-backend; do
          if trivy image --severity HIGH,CRITICAL --ignore-unfixed \
            --format json --output "/repo/artifacts/trivy/images-$${img}.json" "$$img" \
            && trivy image --severity HIGH,CRITICAL --ignore-unfixed \
            --format table --output "/repo/artifacts/trivy/images-$${img}.txt" "$$img"; then
            echo "Scanned image $$img"
          else
            echo "Skipping $$img (image not found — run npm run docker:build first)" \
              > "/repo/artifacts/trivy/images-$${img}.skipped.txt"
          fi
        done

  gitleaks:
    profiles:
      - security
      - analyze
    image: ghcr.io/gitleaks/gitleaks:latest
    volumes:
      - .:/repo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        set -o pipefail
        mkdir -p /repo/artifacts/gitleaks
        gitleaks detect \
          --source=/repo \
          --config=/repo/config/gitleaks.toml \
          $(if [ -d /repo/.git ]; then echo ""; else echo "--no-git"; fi) \
          --report-path=/repo/artifacts/gitleaks/report.json \
          --report-format=json \
          --verbose 2>&1 | tee /repo/artifacts/gitleaks/scan.log

  semgrep:
    profiles:
      - security
      - analyze
    image: semgrep/semgrep:latest
    working_dir: /repo
    volumes:
      - .:/repo
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        set -o pipefail
        mkdir -p /repo/artifacts/semgrep
        semgrep scan \
          --config p/default --config p/csharp --config p/typescript \
          --error \
          --exclude node_modules --exclude bin --exclude obj \
          --json-output=/repo/artifacts/semgrep/report.json \
          --sarif-output=/repo/artifacts/semgrep/report.sarif \
          . 2>&1 | tee /repo/artifacts/semgrep/scan.log

  zap-baseline:
    profiles:
      - security
      - analyze
    image: ghcr.io/zaproxy/zaproxy:stable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./artifacts/zap:/zap/wrk:rw
      - .:/repo
    environment:
      ZAP_TARGET_URL: ${ZAP_TARGET_URL:-}
    networks:
      - app-network
    entrypoint: ["/bin/sh", "/repo/scripts/analyze/zap-baseline.sh"]

networks:
  app-network:
    driver: bridge

volumes:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
