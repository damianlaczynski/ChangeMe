name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  requirements:
    name: Requirements
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Validate requirements structure
        run: npm run requirements:validate

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ChangeMe.Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: src/ChangeMe.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test -- --watch=false

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ChangeMe.Backend/ChangeMe.Backend.slnx

      - name: Format check
        run: dotnet format src/ChangeMe.Backend/ChangeMe.Backend.slnx --severity warn --verify-no-changes --exclude "**/Persistence/Migrations/**"

      - name: Test
        run: dotnet test src/ChangeMe.Backend/ChangeMe.Backend.slnx -c Release --no-restore

      - name: Build
        run: dotnet build src/ChangeMe.Backend/ChangeMe.Backend.slnx -c Release --no-restore

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      ConnectionStrings__DefaultConnection: Host=localhost;Database=ChangeMe;Username=postgres;Password=postgres
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ChangeMe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ChangeMe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025
    defaults:
      run:
        working-directory: src/ChangeMe.Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.15
          cache: npm
          cache-dependency-path: src/ChangeMe.Frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Install frontend dependencies
        run: npm ci

      - name: Restore .NET
        working-directory: .
        run: dotnet restore src/ChangeMe.Backend/ChangeMe.Backend.slnx

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: src/ChangeMe.Frontend/playwright-report/
          retention-days: 7
