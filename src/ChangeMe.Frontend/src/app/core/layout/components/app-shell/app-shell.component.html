<div class="flex min-h-screen w-full bg-surface-50 dark:bg-surface-950">
  @if (showAuthenticatedChrome()) {
    <aside
      class="sticky top-0 hidden h-screen shrink-0 flex-col border-r border-surface-200 bg-surface-0 transition-[width] duration-200 ease-in-out dark:border-surface-700 dark:bg-surface-900 md:flex"
      [class.w-16]="layoutService.$sidebarCollapsed()"
      [class.w-60]="!layoutService.$sidebarCollapsed()"
      [attr.aria-expanded]="!layoutService.$sidebarCollapsed()"
    >
      <div
        class="flex h-14 shrink-0 items-center border-b border-surface-200 px-3 dark:border-surface-700"
        [class.justify-center]="layoutService.$sidebarCollapsed()"
        [class.gap-2]="!layoutService.$sidebarCollapsed()"
      >
        <i class="pi pi-bolt text-primary text-xl" aria-hidden="true"></i>
        @if (!layoutService.$sidebarCollapsed()) {
          <span class="text-color truncate text-lg font-semibold">ChangeMe</span>
        }
      </div>

      <div class="flex min-h-0 flex-1 flex-col overflow-y-auto">
        <app-sidebar-nav
          [items]="authenticatedNavItems()"
          [collapsed]="layoutService.$sidebarCollapsed()"
        />
      </div>
    </aside>

    <p-drawer
      class="md:hidden"
      [visible]="layoutService.$mobileNavOpen()"
      (visibleChange)="onMobileNavVisibleChange($event)"
      position="left"
      [modal]="true"
      [dismissible]="true"
      header="ChangeMe"
      styleClass="app-shell-drawer !w-[min(100vw,18rem)]"
    >
      <app-sidebar-nav
        [items]="authenticatedNavItems()"
        [collapsed]="false"
        (navigate)="layoutService.closeMobileNav()"
      />
    </p-drawer>
  }

  <div class="flex min-w-0 flex-1 flex-col">
    @if (showAuthenticatedChrome()) {
      <header
        class="sticky top-0 z-20 flex h-14 shrink-0 items-center gap-2 border-b border-surface-200 bg-surface-0 px-3 dark:border-surface-700 dark:bg-surface-900 md:px-4"
      >
        <button
          type="button"
          pButton
          [rounded]="true"
          [text]="true"
          severity="secondary"
          [iconOnly]="true"
          [attr.aria-label]="
            isDesktop()
              ? layoutService.$sidebarCollapsed()
                ? 'Expand sidebar'
                : 'Collapse sidebar'
              : 'Open navigation menu'
          "
          (click)="onMenuToggle()"
        >
          <i
            [class]="
              isDesktop() && layoutService.$sidebarCollapsed()
                ? 'pi pi-angle-right'
                : 'pi pi-bars'
            "
            aria-hidden="true"
          ></i>
        </button>

        <span class="text-color truncate text-lg font-semibold md:hidden">
          ChangeMe
        </span>

        <div class="flex-1"></div>

        <div class="flex flex-wrap items-center gap-1 sm:gap-2">
          <app-notifications-bell />
          <button
            type="button"
            pButton
            [rounded]="true"
            [text]="true"
            severity="secondary"
            [iconOnly]="true"
            [attr.aria-label]="
              layoutService.$themeMode() === 'dark'
                ? 'Switch to light mode'
                : 'Switch to dark mode'
            "
            (click)="layoutService.toggleTheme()"
          >
            <i
              [class]="
                layoutService.$themeMode() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'
              "
              aria-hidden="true"
            ></i>
          </button>
          <span
            class="text-muted-color hidden max-w-[12rem] truncate text-sm lg:inline"
          >
            {{ formatUserReference(currentUser()!) }}
          </span>
          <button
            type="button"
            pButton
            severity="secondary"
            [outlined]="true"
            size="small"
            class="hidden sm:inline-flex"
            (click)="logout()"
          >
            <i class="pi pi-sign-out" aria-hidden="true"></i>
            Logout
          </button>
          <button
            type="button"
            pButton
            severity="secondary"
            [rounded]="true"
            [text]="true"
            [iconOnly]="true"
            class="sm:hidden"
            aria-label="Logout"
            (click)="logout()"
          >
            <i class="pi pi-sign-out" aria-hidden="true"></i>
          </button>
        </div>
      </header>
    } @else {
      <header
        class="flex h-14 shrink-0 items-center justify-between gap-4 border-b border-surface-200 bg-surface-0 px-4 dark:border-surface-700 dark:bg-surface-900"
      >
        <span class="text-color flex items-center gap-2 text-lg font-semibold">
          <i class="pi pi-bolt text-primary" aria-hidden="true"></i>
          ChangeMe
        </span>
        <nav class="flex items-center gap-2" aria-label="Account navigation">
          <button
            type="button"
            pButton
            [rounded]="true"
            [text]="true"
            severity="secondary"
            [iconOnly]="true"
            [attr.aria-label]="
              layoutService.$themeMode() === 'dark'
                ? 'Switch to light mode'
                : 'Switch to dark mode'
            "
            (click)="layoutService.toggleTheme()"
          >
            <i
              [class]="
                layoutService.$themeMode() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'
              "
              aria-hidden="true"
            ></i>
          </button>
          <a pButton [text]="true" [routerLink]="['/login']">Login</a>
        </nav>
      </header>
    }

    <main class="mx-auto flex w-full max-w-6xl min-h-0 flex-1 flex-col p-4 md:p-6">
      <router-outlet />
    </main>
  </div>
</div>
