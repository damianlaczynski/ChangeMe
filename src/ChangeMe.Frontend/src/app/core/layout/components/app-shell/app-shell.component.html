<div class="app-shell">
  @if (showAuthenticatedChrome()) {
    <header class="app-shell__header">
      <div class="app-shell__header-start">
        <ui-button
          variant="primary"
          appearance="filled"
          shape="rounded"
          [icon]="sidebarOpen() ? 'dismiss' : 'navigation'"
          [ariaLabel]="sidebarOpen() ? 'Hide navigation' : 'Show navigation'"
          (click)="onMenuToggle()"
        />
        <h1 class="app-shell__brand">ChangeMe</h1>
      </div>

      <div class="app-shell__header-actions">
        <app-notifications-bell />
        <button
          type="button"
          class="app-theme-toggle"
          (click)="layoutService.toggleTheme()"
          [attr.aria-label]="themeLabel()"
        >
          <ui-icon [icon]="themeIcon()" />
          <span class="app-theme-toggle__label">{{ themeLabel() }}</span>
        </button>
        <span class="app-shell__user-label">
          {{ formatUserReference(currentUser()!) }}
        </span>
        <ui-button
          text="Logout"
          icon="sign_out"
          variant="secondary"
          appearance="outline"
          class="app-shell__logout-desktop"
          (click)="logout()"
        />
        <ui-button
          icon="sign_out"
          variant="secondary"
          appearance="subtle"
          shape="circular"
          ariaLabel="Logout"
          class="app-shell__logout-mobile"
          (click)="logout()"
        />
      </div>
    </header>

    <div class="app-shell__workspace">
      <ui-drawer
        class="app-shell__sidebar-drawer"
        [type]="isMobile() ? 'overlay' : 'inline'"
        position="left"
        size="small"
        [title]="isMobile() ? 'Menu' : ''"
        [modalType]="isMobile() ? 'modal' : 'alert'"
        [bodyScrollable]="true"
        [closable]="isMobile()"
        [visible]="sidebarOpen()"
        (close)="closeSidebar()"
      >
        <div class="app-sidebar">
          <app-sidebar-nav
            [items]="authenticatedNavItems()"
            (navigate)="onSidebarNavigate()"
          />
        </div>
      </ui-drawer>

      <main class="app-shell__content">
        <router-outlet />
      </main>
    </div>
  } @else {
    <header class="app-guest-header">
      <span class="app-guest-header__brand">
        <ui-icon icon="flash" />
        ChangeMe
      </span>
      <nav class="app-row" aria-label="Account navigation">
        <button
          type="button"
          class="app-theme-toggle"
          (click)="layoutService.toggleTheme()"
          [attr.aria-label]="themeLabel()"
        >
          <ui-icon [icon]="themeIcon()" />
          <span class="app-theme-toggle__label">{{ themeLabel() }}</span>
        </button>
        <ui-button text="Login" appearance="subtle" (click)="navigateToLogin()" />
      </nav>
    </header>

    <main class="app-shell__content app-shell__content--guest">
      <router-outlet />
    </main>
  }
</div>
