<p-card
  class="mb-4"
  header="Edit user"
  subheader="Update profile, roles, and account status."
>
  <div class="mb-4">
    <app-back-button label="Back to user details" [route]="['/users', id()]" />
  </div>

  @if (isLoading()) {
    <p class="text-muted-color text-sm">Loading user...</p>
  } @else {
    <form
      class="p-fluid flex flex-col gap-4"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >
      <div class="grid gap-4 sm:grid-cols-2">
        <div class="flex flex-col gap-1.5">
          <label for="firstName">First name</label>
          <input
            id="firstName"
            type="text"
            pInputText
            [formControl]="form.controls.firstName"
            [invalid]="shouldShowError(form.controls.firstName)"
          />
        </div>
        <div class="flex flex-col gap-1.5">
          <label for="lastName">Last name</label>
          <input
            id="lastName"
            type="text"
            pInputText
            [formControl]="form.controls.lastName"
            [invalid]="shouldShowError(form.controls.lastName)"
          />
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          pInputText
          [formControl]="form.controls.email"
          [invalid]="shouldShowError(form.controls.email)"
        />
      </div>

      @if (showRolesField()) {
        <div class="flex flex-col gap-1.5">
          <label for="roles">Roles</label>
          <p-multiselect
            inputId="roles"
            [formControl]="form.controls.roleIds"
            [options]="roleOptions()"
            optionLabel="name"
            optionValue="id"
            placeholder="Select roles"
            display="chip"
            [invalid]="shouldShowError(form.controls.roleIds)"
          />
        </div>

        <app-effective-permissions
          [permissions]="effectivePermissions()"
          [roleIdsSelected]="form.controls.roleIds.value.length > 0"
        />
      }

      @if (showStatusField()) {
        <div class="flex flex-col gap-1.5">
          <label for="status">Status</label>
          <p-select
            inputId="status"
            [formControl]="form.controls.status"
            [options]="userStatuses"
            optionLabel="label"
            optionValue="value"
          />
        </div>
      }

      @if (submitError()) {
        <p-message severity="error">{{ submitError() }}</p-message>
      }

      <div class="flex flex-wrap items-center gap-3">
        <p-button
          type="button"
          label="Cancel"
          severity="secondary"
          [outlined]="true"
          [routerLink]="['/users', id()]"
        />
        <p-button
          type="submit"
          label="Save changes"
          icon="pi pi-save"
          [loading]="isSubmitting()"
        />
      </div>
    </form>
  }
</p-card>
