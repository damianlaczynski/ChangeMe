<p-card
  class="mb-4"
  [header]="pageTitle()"
  subheader="Update profile, roles, and account status"
>
  <div class="mb-4 flex flex-wrap items-center gap-2">
    <app-back-button label="Back to user details" [route]="['/users', id()]" />
  </div>

  @if (isLoading()) {
    <div class="flex flex-col items-center gap-2 py-8">
      <p-progress-spinner ariaLabel="Loading user form" />
      <p class="text-muted-color m-0 text-sm">Loading user data...</p>
    </div>
  } @else if (loadError()) {
    <div class="flex flex-col items-center gap-2">
      <p-message severity="error">{{ loadError() }}</p-message>
      <button
        type="button"
        pButton
        size="small"
        severity="secondary"
        [outlined]="true"
        [disabled]="isLoading()"
        (click)="refresh()"
      >
        @if (isLoading()) {
          <i class="pi pi-spin pi-spinner" aria-hidden="true"></i>
        } @else {
          <i class="pi pi-refresh" aria-hidden="true"></i>
        }
        Try again
      </button>
    </div>
  } @else {
    <form
      class="p-fluid flex flex-col gap-4"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >
      <p-panel header="Profile" [toggleable]="true">
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="flex flex-col gap-1.5">
            <label for="firstName">First name</label>
            <input
              id="firstName"
              type="text"
              pInputText
              [formControl]="form.controls.firstName"
              [invalid]="shouldShowError(form.controls.firstName)"
            />
          </div>
          <div class="flex flex-col gap-1.5">
            <label for="lastName">Last name</label>
            <input
              id="lastName"
              type="text"
              pInputText
              [formControl]="form.controls.lastName"
              [invalid]="shouldShowError(form.controls.lastName)"
            />
          </div>
        </div>

        <div class="mt-4 flex flex-col gap-1.5">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            pInputText
            [formControl]="form.controls.email"
            [invalid]="shouldShowError(form.controls.email)"
          />
        </div>
      </p-panel>

      @if (showRolesField()) {
        <p-panel header="Roles" [toggleable]="true">
          <div class="flex flex-col gap-1.5">
            <label for="roles">Roles</label>
            <p-multiselect
              inputId="roles"
              [formControl]="form.controls.roleIds"
              [options]="roleOptions()"
              optionLabel="name"
              optionValue="id"
              placeholder="Select roles"
              display="chip"
              [invalid]="shouldShowError(form.controls.roleIds)"
            />
          </div>
        </p-panel>

        <app-effective-permissions
          [permissions]="effectivePermissions()"
          [roleIdsSelected]="form.controls.roleIds.value.length > 0"
        />
      }

      @if (showStatusField()) {
        <p-panel header="Account status" [toggleable]="true">
          <div class="flex items-center gap-2">
            <p-checkbox
              inputId="deactivated"
              [formControl]="form.controls.deactivated"
              [binary]="true"
            />
            <label for="deactivated">Deactivated</label>
          </div>
        </p-panel>
      }

      @if (submitError()) {
        <p-message severity="error">{{ submitError() }}</p-message>
      }

      <div class="flex flex-wrap items-center justify-end gap-2">
        <a
          pButton
          severity="secondary"
          [outlined]="true"
          [routerLink]="['/users', id()]"
        >
          Cancel
        </a>
        <button type="submit" pButton [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <i class="pi pi-spin pi-spinner" aria-hidden="true"></i>
          } @else {
            <i class="pi pi-save" aria-hidden="true"></i>
          }
          {{ isSubmitting() ? 'Saving...' : 'Save changes' }}
        </button>
      </div>
    </form>
  }
</p-card>
