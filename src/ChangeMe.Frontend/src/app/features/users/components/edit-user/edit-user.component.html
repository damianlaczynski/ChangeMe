<section class="app-page app-page--form app-page--wide" aria-label="Edit user">
  <header class="app-page__header">
    <h1 class="app-page__title">{{ pageTitle() }}</h1>
    <p class="app-page__subtitle">Update profile, roles, and account status</p>
  </header>

  <div class="app-page__toolbar">
    <app-back-button label="Back to user details" [route]="['/users', id()]" />
  </div>

  <div class="app-page__body app-page__body--form">
    @if (isLoading()) {
      <div class="app-center-state">
        <ui-spinner size="medium" ariaLabel="Loading user form" />
        <p class="app-muted">Loading user data...</p>
      </div>
    } @else if (loadError()) {
      <div class="app-center-state">
        <ui-message-bar [title]="loadError()!" variant="danger" />
        <ui-button
          text="Try again"
          icon="arrow_sync"
          variant="secondary"
          appearance="outline"
          [loading]="isLoading()"
          (click)="refresh()"
        />
      </div>
    } @else {
      <form class="app-form-workspace" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="app-form-workspace__scroll app-stack-md">
          <ui-accordion appDefaultExpanded label="Profile" icon="person">
            <div class="app-stack-md">
              <div class="app-form__grid app-form__grid--two">
                <ui-text
                  label="First name"
                  [formControl]="form.controls.firstName"
                  [required]="true"
                  [errorText]="
                    fieldError(
                      form.controls.firstName,
                      UserFieldErrors.firstName,
                      submitted()
                    )
                  "
                />
                <ui-text
                  label="Last name"
                  [formControl]="form.controls.lastName"
                  [required]="true"
                  [errorText]="
                    fieldError(
                      form.controls.lastName,
                      UserFieldErrors.lastName,
                      submitted()
                    )
                  "
                />
              </div>
              <ui-text
                label="Email"
                type="email"
                [formControl]="form.controls.email"
                [required]="true"
                [errorText]="
                  fieldError(form.controls.email, UserFieldErrors.email, submitted())
                "
              />
            </div>
          </ui-accordion>

          @if (showRolesField()) {
            <ui-accordion appDefaultExpanded label="Roles" icon="people">
              <ui-dropdown
                label="Roles"
                placeholder="Select roles"
                mode="multi"
                [items]="roleItems()"
                [formControl]="form.controls.roleIds"
                [required]="true"
                [errorText]="
                  fieldError(
                    form.controls.roleIds,
                    UserFieldErrors.roleIds,
                    submitted()
                  )
                "
              />
            </ui-accordion>

            <app-effective-permissions
              [permissions]="effectivePermissions()"
              [roleIdsSelected]="form.controls.roleIds.value.length > 0"
            />
          }

          @if (showStatusField()) {
            <ui-accordion
              appDefaultExpanded
              label="Account status"
              icon="person_prohibited"
            >
              <ui-checkbox
                label="Deactivated"
                labelPosition="after"
                [formControl]="form.controls.deactivated"
              />
            </ui-accordion>
          }

          @if (submitError()) {
            <ui-message-bar [title]="submitError()!" variant="danger" />
          }
        </div>

        <footer class="app-form-workspace__footer">
          <div class="app-form__actions">
            <ui-button
              type="button"
              text="Cancel"
              variant="secondary"
              appearance="outline"
              [routerLink]="['/users', id()]"
            />
            <ui-button
              type="submit"
              [text]="isSubmitting() ? 'Saving...' : 'Save changes'"
              icon="save"
              variant="primary"
              [loading]="isSubmitting()"
            />
          </div>
        </footer>
      </form>
    }
  </div>
</section>
