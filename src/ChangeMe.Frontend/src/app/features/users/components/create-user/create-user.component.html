<section class="app-page app-page--form app-page--wide" aria-label="Create user">
  <header class="app-page__header">
    <h1 class="app-page__title">Create user</h1>
    <p class="app-page__subtitle">
      Create a user account with email, password, and roles.
    </p>
  </header>

  <div class="app-page__toolbar">
    <app-back-button label="Back to users list" [route]="['/users']" />
  </div>

  <div class="app-page__body app-page__body--form">
    <form class="app-form-workspace" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="app-form-workspace__scroll app-stack-md">
        <ui-accordion appDefaultExpanded label="Profile" icon="person">
          <div class="app-stack-md">
            <div class="app-form__grid app-form__grid--two">
              <ui-text
                label="First name"
                [formControl]="form.controls.firstName"
                [required]="true"
                [errorText]="
                  fieldError(
                    form.controls.firstName,
                    UserFieldErrors.firstName,
                    submitted()
                  )
                "
              />
              <ui-text
                label="Last name"
                [formControl]="form.controls.lastName"
                [required]="true"
                [errorText]="
                  fieldError(
                    form.controls.lastName,
                    UserFieldErrors.lastName,
                    submitted()
                  )
                "
              />
            </div>
            <ui-text
              label="Email"
              type="email"
              [formControl]="form.controls.email"
              [required]="true"
              [errorText]="
                fieldError(form.controls.email, UserFieldErrors.email, submitted())
              "
            />
          </div>
        </ui-accordion>

        <ui-accordion appDefaultExpanded label="Password" icon="lock_closed">
          <div class="app-form__grid app-form__grid--two">
            <ui-password
              label="Password"
              autocomplete="new-password"
              [formControl]="form.controls.password"
              [required]="true"
              [errorText]="
                fieldError(
                  form.controls.password,
                  UserFieldErrors.password,
                  submitted()
                )
              "
            />
            <ui-password
              label="Confirm password"
              autocomplete="new-password"
              [formControl]="form.controls.confirmPassword"
              [required]="true"
              [errorText]="
                fieldError(
                  form.controls.confirmPassword,
                  UserFieldErrors.confirmPassword,
                  submitted()
                )
              "
            />
          </div>
        </ui-accordion>

        <ui-accordion appDefaultExpanded label="Roles" icon="people">
          <ui-dropdown
            label="Roles"
            placeholder="Select roles"
            mode="multi"
            [items]="roleItems()"
            [formControl]="form.controls.roleIds"
            [required]="true"
            [errorText]="
              fieldError(form.controls.roleIds, UserFieldErrors.roleIds, submitted())
            "
          />
        </ui-accordion>

        <app-effective-permissions
          [permissions]="effectivePermissions()"
          [roleIdsSelected]="form.controls.roleIds.value.length > 0"
        />

        @if (submitError()) {
          <ui-message-bar [title]="submitError()!" variant="danger" />
        }
      </div>

      <footer class="app-form-workspace__footer">
        <div class="app-form__actions">
          <ui-button
            type="button"
            text="Cancel"
            variant="secondary"
            appearance="outline"
            [routerLink]="['/users']"
          />
          <ui-button
            type="submit"
            [text]="isSubmitting() ? 'Creating user...' : 'Create user'"
            icon="person_add"
            variant="primary"
            [loading]="isSubmitting()"
          />
        </div>
      </footer>
    </form>
  </div>
</section>
