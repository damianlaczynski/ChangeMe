<p-card
  class="mb-4"
  header="Create Role"
  subheader="Define a custom role and its permissions"
>
  <div class="mb-4 flex flex-wrap items-center gap-2">
    <app-back-button label="Back to roles list" [route]="['/roles']" />
  </div>

  <form class="p-fluid flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
    <p-panel header="Role details" [toggleable]="true">
      <div class="flex flex-col gap-1.5">
        <label for="name">Name</label>
        <input
          id="name"
          type="text"
          pInputText
          [formControl]="form.controls.name"
          [invalid]="shouldShowError(form.controls.name)"
        />
      </div>

      <div class="mt-4 flex flex-col gap-1.5">
        <label for="description">Description</label>
        <textarea
          id="description"
          pTextarea
          rows="3"
          [formControl]="form.controls.description"
          [invalid]="shouldShowError(form.controls.description)"
        ></textarea>
        @if (shouldShowError(form.controls.description)) {
          <p-message severity="error" variant="simple">
            {{ RoleMessages.descriptionTooLong }}
          </p-message>
        }
      </div>
    </p-panel>

    <p-panel header="Permissions" [toggleable]="true">
      <app-permission-checklist
        [catalog]="catalog()"
        [control]="form.controls.permissionCodes"
        [showFormError]="permissionsError()"
      />
    </p-panel>

    @if (submitError()) {
      <p-message severity="error">{{ submitError() }}</p-message>
    }

    <div class="flex flex-wrap items-center justify-end gap-2">
      <button
        type="button"
        pButton
        severity="secondary"
        [outlined]="true"
        (click)="cancel()"
      >
        Cancel
      </button>
      <button type="submit" pButton [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <i class="pi pi-spin pi-spinner" aria-hidden="true"></i>
        } @else {
          <i class="pi pi-check" aria-hidden="true"></i>
        }
        {{ isSubmitting() ? 'Creating role...' : 'Create role' }}
      </button>
    </div>
  </form>
</p-card>
