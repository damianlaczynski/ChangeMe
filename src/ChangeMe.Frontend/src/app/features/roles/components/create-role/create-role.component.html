<p-card
  class="mb-4"
  header="Create role"
  subheader="Define a custom role and its permissions."
>
  <div class="mb-4">
    <app-back-button label="Back to roles list" [route]="['/roles']" />
  </div>

  <form class="p-fluid flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="flex flex-col gap-1.5">
      <label for="name">Name</label>
      <input
        id="name"
        type="text"
        pInputText
        [formControl]="form.controls.name"
        [invalid]="shouldShowError(form.controls.name)"
      />
    </div>

    <div class="flex flex-col gap-1.5">
      <label for="description">Description</label>
      <textarea
        id="description"
        pTextarea
        rows="3"
        [formControl]="form.controls.description"
        [invalid]="shouldShowError(form.controls.description)"
      ></textarea>
      @if (shouldShowError(form.controls.description)) {
        <p-message severity="error">{{ RoleMessages.descriptionTooLong }}</p-message>
      }
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-color font-medium">Permissions</label>
      <app-permission-checklist
        [catalog]="catalog()"
        [control]="form.controls.permissionCodes"
        [showFormError]="permissionsError()"
      />
    </div>

    @if (submitError()) {
      <p-message severity="error">{{ submitError() }}</p-message>
    }

    <div class="flex flex-wrap gap-2">
      <p-button
        type="submit"
        label="Create role"
        icon="pi pi-check"
        [loading]="isSubmitting()"
      />
      <p-button
        type="button"
        label="Cancel"
        severity="secondary"
        [outlined]="true"
        [routerLink]="['/roles']"
      />
    </div>
  </form>
</p-card>
