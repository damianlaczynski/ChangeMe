<section class="app-page app-page--form app-page--wide" aria-label="Create role">
  <header class="app-page__header">
    <h1 class="app-page__title">Create Role</h1>
    <p class="app-page__subtitle">Define a custom role and its permissions</p>
  </header>

  <div class="app-page__toolbar">
    <app-back-button label="Back to roles list" [route]="['/roles']" />
  </div>

  <div class="app-page__body app-page__body--form">
    <form class="app-form-workspace" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="app-form-workspace__scroll app-stack-md">
        <ui-accordion appDefaultExpanded label="Role details" icon="shield">
          <div class="app-stack-md">
            <ui-text
              label="Name"
              [formControl]="form.controls.name"
              [required]="true"
              [errorText]="
                fieldError(form.controls.name, RoleFieldErrors.name, submitted())
              "
            />
            <ui-textarea
              label="Description"
              [rows]="3"
              [formControl]="form.controls.description"
              [errorText]="
                fieldError(
                  form.controls.description,
                  RoleFieldErrors.description,
                  submitted()
                )
              "
            />
          </div>
        </ui-accordion>

        <ui-accordion appDefaultExpanded label="Permissions" icon="key">
          <app-permission-checklist
            [catalog]="catalog()"
            [control]="form.controls.permissionCodes"
            [showFormError]="permissionsError()"
          />
        </ui-accordion>

        @if (submitError()) {
          <ui-message-bar [title]="submitError()!" variant="danger" />
        }
      </div>

      <footer class="app-form-workspace__footer">
        <div class="app-form__actions">
          <ui-button
            text="Cancel"
            variant="secondary"
            appearance="outline"
            (click)="cancel()"
          />
          <ui-button
            type="submit"
            [text]="isSubmitting() ? 'Creating role...' : 'Create role'"
            icon="checkmark"
            variant="primary"
            [loading]="isSubmitting()"
          />
        </div>
      </footer>
    </form>
  </div>
</section>
