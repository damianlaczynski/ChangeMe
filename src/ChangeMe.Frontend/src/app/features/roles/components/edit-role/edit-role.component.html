<section class="app-page app-page--form app-page--wide" aria-label="Edit role">
  <header class="app-page__header">
    <h1 class="app-page__title">{{ pageTitle() }}</h1>
    <p class="app-page__subtitle">Update role name, description, and permissions</p>
  </header>

  <div class="app-page__toolbar">
    @if (id(); as roleId) {
      <app-back-button label="Back to role details" [route]="['/roles', roleId]" />
    }
  </div>

  <div class="app-page__body app-page__body--form">
    @if (isLoading()) {
      <div class="app-center-state">
        <ui-spinner size="medium" ariaLabel="Loading role form" />
        <p class="app-muted">Loading role data...</p>
      </div>
    } @else if (loadError()) {
      <div class="app-center-state">
        <ui-message-bar [title]="loadError()!" variant="danger" />
        <ui-button
          text="Try again"
          icon="arrow_sync"
          variant="secondary"
          appearance="outline"
          [loading]="isLoading()"
          (click)="refresh()"
        />
      </div>
    } @else {
      <form class="app-form-workspace" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="app-form-workspace__scroll app-stack-md">
          <ui-accordion appDefaultExpanded label="Role details" icon="shield">
            <div class="app-stack-md">
              <ui-text
                label="Name"
                [formControl]="form.controls.name"
                [required]="true"
                [errorText]="
                  fieldError(form.controls.name, RoleFieldErrors.name, submitted())
                "
              />
              <ui-textarea
                label="Description"
                [rows]="3"
                [formControl]="form.controls.description"
                [errorText]="
                  fieldError(
                    form.controls.description,
                    RoleFieldErrors.description,
                    submitted()
                  )
                "
              />
            </div>
          </ui-accordion>

          <ui-accordion appDefaultExpanded label="Permissions" icon="key">
            <app-permission-checklist
              [catalog]="catalog()"
              [control]="form.controls.permissionCodes"
              [showFormError]="permissionsError()"
            />
          </ui-accordion>

          @if (submitError()) {
            <ui-message-bar [title]="submitError()!" variant="danger" />
          }
        </div>

        <footer class="app-form-workspace__footer">
          <div class="app-form__actions">
            <ui-button
              text="Cancel"
              variant="secondary"
              appearance="outline"
              [routerLink]="['/roles', id()]"
            />
            <ui-button
              type="submit"
              [text]="isSubmitting() ? 'Saving...' : 'Save changes'"
              icon="checkmark"
              variant="primary"
              [loading]="isSubmitting()"
            />
          </div>
        </footer>
      </form>
    }
  </div>
</section>
