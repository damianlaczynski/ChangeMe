<section
  class="app-page-fill mx-auto flex min-h-0 w-full max-w-none flex-1 flex-col gap-3 overflow-hidden"
  aria-label="Edit role"
>
  <header class="grid shrink-0 gap-1.5 pb-2">
    <h1 class="m-0 text-xl font-semibold tracking-tight text-foreground md:text-2xl">
      {{ pageTitle() }}
    </h1>
    <p class="m-0 max-w-3xl text-sm leading-normal text-foreground-2">
      Update role name, description, and permissions
    </p>
  </header>

  <div class="flex shrink-0 flex-wrap items-center gap-2">
    @if (id(); as roleId) {
      <app-back-button label="Back to role details" [route]="['/roles', roleId]" />
    }
  </div>

  <div class="flex min-h-0 flex-1 flex-col">
    @if (isLoading()) {
      <div class="flex flex-col items-center gap-2 py-8">
        <ui-spinner size="medium" ariaLabel="Loading role form" />
        <p class="text-foreground-2">Loading role data...</p>
      </div>
    } @else if (loadError()) {
      <div class="flex flex-col items-center gap-2 py-8">
        <ui-message-bar [title]="loadError()!" variant="danger" />
        <ui-button
          text="Try again"
          icon="arrow_sync"
          variant="secondary"
          appearance="outline"
          [loading]="isLoading()"
          (click)="refresh()"
        />
      </div>
    } @else {
      <form
        class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-xl bg-surface-2"
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
      >
        <div class="flex min-h-0 flex-1 flex-col gap-4 overflow-y-auto p-4 md:p-6">
          <ui-accordion appDefaultExpanded label="Role details" icon="shield">
            <div class="flex flex-col gap-4">
              <ui-text
                label="Name"
                [formControl]="form.controls.name"
                [required]="true"
                [errorText]="
                  fieldError(form.controls.name, RoleFieldErrors.name, submitted())
                "
              />
              <ui-textarea
                label="Description"
                [rows]="3"
                [formControl]="form.controls.description"
                [errorText]="
                  fieldError(
                    form.controls.description,
                    RoleFieldErrors.description,
                    submitted()
                  )
                "
              />
            </div>
          </ui-accordion>

          <ui-accordion appDefaultExpanded label="Permissions" icon="key">
            <app-permission-checklist
              [catalog]="catalog()"
              [control]="form.controls.permissionCodes"
              [showFormError]="permissionsError()"
            />
          </ui-accordion>

          @if (submitError()) {
            <ui-message-bar [title]="submitError()!" variant="danger" />
          }
        </div>

        <footer
          class="flex shrink-0 items-center justify-end gap-2 border-t border-stroke bg-surface-2 px-4 py-3.5 md:px-6"
        >
          <div class="flex w-full flex-wrap items-center justify-end gap-2">
            <ui-button
              text="Cancel"
              variant="secondary"
              appearance="outline"
              [routerLink]="['/roles', id()]"
            />
            <ui-button
              type="submit"
              [text]="isSubmitting() ? 'Saving...' : 'Save changes'"
              icon="checkmark"
              variant="primary"
              [loading]="isSubmitting()"
            />
          </div>
        </footer>
      </form>
    }
  </div>
</section>
