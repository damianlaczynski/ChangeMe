<p-card
  class="mb-4"
  [header]="pageTitle()"
  subheader="Update role name, description, and permissions"
>
  <div class="mb-4 flex flex-wrap items-center gap-2">
    @if (id(); as roleId) {
      <app-back-button label="Back to role details" [route]="['/roles', roleId]" />
    }
  </div>

  @if (isLoading()) {
    <div class="flex flex-col items-center gap-2 py-8">
      <p-progress-spinner ariaLabel="Loading role form" />
      <p class="text-muted-color m-0 text-sm">Loading role data...</p>
    </div>
  } @else if (loadError()) {
    <div class="flex flex-col items-center gap-2">
      <p-message severity="error">{{ loadError() }}</p-message>
      <p-button
        size="small"
        label="Try again"
        icon="pi pi-refresh"
        severity="secondary"
        [outlined]="true"
        [loading]="isLoading()"
        (onClick)="refresh()"
      />
    </div>
  } @else {
    <form
      class="p-fluid flex flex-col gap-4"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >
      <p-panel header="Role details" [toggleable]="true">
        <div class="flex flex-col gap-1.5">
          <label for="name">Name</label>
          <input
            id="name"
            type="text"
            pInputText
            [formControl]="form.controls.name"
            [invalid]="shouldShowError(form.controls.name)"
          />
        </div>

        <div class="mt-4 flex flex-col gap-1.5">
          <label for="description">Description</label>
          <textarea
            id="description"
            pTextarea
            rows="3"
            [formControl]="form.controls.description"
            [invalid]="shouldShowError(form.controls.description)"
          ></textarea>
          @if (shouldShowError(form.controls.description)) {
            <p-message severity="error" variant="simple">
              {{ RoleMessages.descriptionTooLong }}
            </p-message>
          }
        </div>
      </p-panel>

      <p-panel header="Permissions" [toggleable]="true">
        <app-permission-checklist
          [catalog]="catalog()"
          [control]="form.controls.permissionCodes"
          [showFormError]="permissionsError()"
        />
      </p-panel>

      @if (submitError()) {
        <p-message severity="error">{{ submitError() }}</p-message>
      }

      <div class="flex flex-wrap items-center justify-end gap-2">
        <p-button
          label="Cancel"
          severity="secondary"
          [outlined]="true"
          [routerLink]="['/roles', id()]"
        />
        <p-button
          type="submit"
          [label]="isSubmitting() ? 'Saving...' : 'Save changes'"
          icon="pi pi-check"
          [loading]="isSubmitting()"
        />
      </div>
    </form>
  }
</p-card>
