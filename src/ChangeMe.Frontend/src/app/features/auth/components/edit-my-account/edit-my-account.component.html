<section class="app-page app-page--form" aria-label="Edit profile">
  <header class="app-page__header">
    <h1 class="app-page__title">Edit profile</h1>
    <p class="app-page__subtitle">Update your name.</p>
  </header>

  <div class="app-page__toolbar">
    <app-back-button label="Back to my account" [route]="['/account']" />
  </div>

  <div class="app-page__body app-page__body--form">
    @if (isLoading()) {
      <div class="app-center-state">
        <ui-spinner size="medium" ariaLabel="Loading profile" />
        <p class="app-muted">Loading profile...</p>
      </div>
    } @else if (loadError()) {
      <div class="app-center-state">
        <ui-message-bar [title]="loadError()!" variant="danger" />
        <ui-button
          text="Try again"
          icon="arrow_sync"
          variant="secondary"
          appearance="outline"
          [loading]="isLoading()"
          (click)="reload()"
        />
      </div>
    } @else {
      <form class="app-form-workspace" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="app-form-workspace__scroll app-stack-md">
          <ui-accordion appDefaultExpanded label="Profile" icon="person">
            <div class="app-form__grid app-form__grid--two">
              <ui-text
                label="First name"
                [formControl]="form.controls.firstName"
                [required]="true"
                [errorText]="
                  fieldError(
                    form.controls.firstName,
                    AuthFieldErrors.firstName,
                    submitted()
                  )
                "
              />
              <ui-text
                label="Last name"
                [formControl]="form.controls.lastName"
                [required]="true"
                [errorText]="
                  fieldError(
                    form.controls.lastName,
                    AuthFieldErrors.lastName,
                    submitted()
                  )
                "
              />
            </div>
          </ui-accordion>

          @if (submitError()) {
            <ui-message-bar [title]="submitError()!" variant="danger" />
          }
        </div>

        <footer class="app-form-workspace__footer">
          <div class="app-form__actions">
            <ui-button
              type="button"
              text="Cancel"
              variant="secondary"
              appearance="outline"
              [routerLink]="['/account']"
            />
            <ui-button
              type="submit"
              [text]="isSubmitting() ? 'Saving...' : 'Save changes'"
              icon="save"
              variant="primary"
              [loading]="isSubmitting()"
            />
          </div>
        </footer>
      </form>
    }
  </div>
</section>
