@if (showBanner()) {
  <div
    class="border-b border-surface-200 bg-surface-0 px-3 py-2 dark:border-surface-700 dark:bg-surface-900 md:px-4"
  >
    <div
      class="mx-auto flex w-full max-w-6xl flex-wrap items-center justify-between gap-2"
    >
      <p-message severity="warn" variant="simple">{{ message }}</p-message>
      <p-button
        [label]="actionLabel"
        icon="pi pi-shield"
        size="small"
        (onClick)="openSetup()"
      />
    </div>
  </div>
}
