<p-dialog
  [header]="title"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [visible]="dialogServiceRef.visible()"
  (visibleChange)="onVisibleChange($event)"
  styleClass="w-full max-w-lg"
>
  <p class="text-muted-color mb-4 text-sm">
    {{ subtitle }}
  </p>

  <app-required-password-change-form (submitted)="onSubmit($event)" />
</p-dialog>
