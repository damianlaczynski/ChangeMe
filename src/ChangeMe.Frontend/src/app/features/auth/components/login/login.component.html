<app-auth-page
  title="Welcome back"
  subtitle="Sign in to create, edit and delete issues."
>
  <form class="app-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <ui-text
      label="Email"
      type="email"
      autocomplete="email"
      [formControl]="form.controls.email"
      [required]="true"
      [errorText]="fieldError(form.controls.email, AuthFieldErrors.email, submitted())"
    />

    <ui-password
      label="Password"
      autocomplete="current-password"
      [formControl]="form.controls.password"
      [required]="true"
      [errorText]="fieldError(form.controls.password, AuthFieldErrors.password, submitted())"
    />

    @if (errorMessage()) {
      <ui-message-bar [title]="errorMessage()" variant="danger" />
    }

    <ui-button
      type="submit"
      [text]="isSubmitting() ? 'Signing in...' : 'Sign in'"
      icon="arrow_enter"
      variant="primary"
      [loading]="isSubmitting()"
      [fullWidth]="true"
    />
  </form>
</app-auth-page>
