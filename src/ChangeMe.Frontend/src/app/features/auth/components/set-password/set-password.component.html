<p-card
  [header]="authMessages.setPasswordTitle"
  [subheader]="authMessages.setPasswordSubtitle"
>
  <div class="mb-4">
    <app-back-button label="Back to my account" [route]="['/account']" />
  </div>

  @if (account(); as profile) {
    <form
      class="p-fluid flex flex-col gap-4"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >
      <p-panel header="New password" [toggleable]="true">
        <div class="grid gap-4">
          <div class="flex flex-col gap-1.5">
            <label for="newPassword">New password</label>
            <p-password
              inputId="newPassword"
              autocomplete="new-password"
              [formControl]="form.controls.newPassword"
              [toggleMask]="true"
              fluid
              [invalid]="shouldShowError(form.controls.newPassword)"
            />
          </div>
          <div class="flex flex-col gap-1.5">
            <label for="confirmNewPassword">Confirm new password</label>
            <p-password
              inputId="confirmNewPassword"
              autocomplete="new-password"
              [formControl]="form.controls.confirmNewPassword"
              [feedback]="false"
              [toggleMask]="true"
              fluid
              [invalid]="shouldShowError(form.controls.confirmNewPassword)"
            />
            @if (form.touched && form.errors?.['passwordMismatch']) {
              <p-message severity="error" variant="simple">
                Passwords do not match.
              </p-message>
            }
          </div>
        </div>
      </p-panel>

      @if (submitError()) {
        <p-message severity="error">{{ submitError() }}</p-message>
      }

      <p-button
        type="submit"
        label="Set password"
        icon="pi pi-lock"
        [loading]="isSubmitting()"
      />
    </form>
  }
</p-card>

@if (account(); as profile) {
  <app-identity-step-up-dialog
    [account]="profile"
    [visible]="stepUpVisible()"
    [passkeysEnabled]="passkeysEnabled()"
    [stepUpValidityMinutes]="stepUpValidityMinutes()"
    submitLabel="Set password"
    [submitting]="isSubmitting()"
    [errorMessage]="stepUpError()"
    fieldIdPrefix="setPasswordStepUp"
    (visibleChange)="stepUpVisible.set($event)"
    (cancelled)="closeStepUp()"
    (verified)="onStepUpVerified($event)"
    [beforeExternalRedirect]="prepareExternalRedirect"
    (externalRedirectFailed)="onExternalRedirectFailed()"
  />
}
