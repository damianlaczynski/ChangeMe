<div class="detail-tab-panel">
  @if (loadError()) {
    <ui-message-bar [title]="loadError()!" variant="danger" />
  } @else if (isLoadingHistory()) {
    <ui-spinner ariaLabel="Loading history" />
  } @else if (historyEntries().length > 0) {
    <ui-timeline [items]="timelineItems()" size="large" ariaLabel="Issue history" />
  } @else if (hasLoadedHistory()) {
    <p class="detail-tab-empty">No history entries found</p>
  }

  @if (canShowMoreHistory()) {
    <div class="detail-tab-actions">
      <ui-button
        text="Show more"
        appearance="outline"
        variant="secondary"
        [loading]="isLoadingMoreHistory()"
        (click)="showMoreHistory()"
      />
    </div>
  }
</div>
