<div class="app-stack-md">
  @if (loadError()) {
    <ui-message-bar [title]="loadError()!" variant="danger" />
  } @else if (isLoadingHistory()) {
    <ui-spinner ariaLabel="Loading history" />
  } @else if (historyEntries().length > 0) {
    <ui-timeline [items]="timelineItems()" ariaLabel="Issue history" />
  } @else if (hasLoadedHistory()) {
    <p class="app-muted">No history entries found</p>
  }

  @if (canShowMoreHistory()) {
    <div class="app-form__actions app-form__actions--center">
      <ui-button
        text="Show more"
        appearance="subtle"
        variant="secondary"
        [loading]="isLoadingMoreHistory()"
        (click)="showMoreHistory()"
      />
    </div>
  }
</div>
