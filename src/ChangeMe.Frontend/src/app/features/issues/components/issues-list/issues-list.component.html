<section class="app-page app-page--wide app-page--grid" aria-label="Issues list">
  <header class="app-page__header">
    <h1 class="app-page__title">Issues list</h1>
    <p class="app-page__subtitle">Browse, filter and monitor issues.</p>
  </header>

  <div class="app-page__toolbar">
    <ui-button
      text="Add issue"
      icon="add"
      variant="primary"
      [routerLink]="['/issues', 'create']"
    />
  </div>

  <div class="app-page__body app-page__body--grid">
    @if (errorMessage(); as message) {
      <ui-message-bar [title]="message" variant="danger" />
    }

    <qg-ui-data-grid [grid]="grid" [pageSizeOptions]="[10, 25, 50]">
      <ng-template
        qgColumn="title"
        header="Title"
        [filter]="{ type: 'text', placeholder: 'Title…' }"
        [qgColumnOf]="rowType"
        width="220px"
        let-issue
      >
        <a class="app-link" [routerLink]="['/issues', issue.id]">{{ issue.title }}</a>
      </ng-template>

      <ng-template
        qgColumn="status"
        header="Status"
        [filter]="{ type: 'enum', options: issueStatuses() }"
        [qgColumnOf]="rowType"
        width="140px"
        let-issue
      >
        <ui-tag
          [text]="getIssueStatusLabel(issue.status)"
          [variant]="getIssueStatusSeverity(issue.status)"
          appearance="tint"
        />
      </ng-template>

      <ng-template
        qgColumn="priority"
        header="Priority"
        [filter]="{ type: 'enum', options: issuePriorities() }"
        [qgColumnOf]="rowType"
        width="140px"
        let-issue
      >
        <ui-tag
          [text]="getIssuePriorityLabel(issue.priority)"
          [variant]="getIssuePrioritySeverity(issue.priority)"
          appearance="tint"
        />
      </ng-template>

      <ng-template
        qgColumn="assignedToUserId"
        header="Assigned to"
        [sortable]="false"
        [filter]="{ type: 'enum', options: assignableUserFilterOptions() }"
        [qgColumnOf]="rowType"
        width="180px"
        let-issue
      >
        {{ issue.assignedToUserName || 'Unassigned' }}
      </ng-template>

      <ng-template
        qgColumn="createdAt"
        header="Created at"
        [filter]="{ type: 'date' }"
        [qgColumnOf]="rowType"
        width="160px"
        let-issue
      >
        {{ issue.createdAt | date: 'dd.MM.yyyy HH:mm' }}
      </ng-template>

      <ng-template
        qgColumn="lastActivityAt"
        header="Last activity"
        [filter]="{ type: 'date' }"
        [qgColumnOf]="rowType"
        width="160px"
        let-issue
      >
        {{ issue.lastActivityAt | date: 'dd.MM.yyyy HH:mm' }}
      </ng-template>

      <ng-template
        qgColumn="actions"
        header=""
        [sortable]="false"
        [qgColumnOf]="rowType"
        width="140px"
        let-issue
      >
        <div class="app-row">
          <ui-button
            [text]="issue.watchersCount.toString()"
            [icon]="issue.isWatchedByCurrentUser ? 'alert_off' : 'alert'"
            [variant]="issue.isWatchedByCurrentUser ? 'success' : 'secondary'"
            [appearance]="issue.isWatchedByCurrentUser ? 'filled' : 'outline'"
            [loading]="isWatchPending(issue.id)"
            [uiTooltip]="getWatchTooltip(issue)"
            uiTooltipPosition="top"
            [attr.aria-label]="getWatchTooltip(issue)"
            (click)="toggleWatch(issue)"
          />
          <ui-menu
            triggerVariant="dropdown"
            [menuItems]="getIssueMenuItems(issue)"
            icon="more_horizontal"
            ariaLabel="Issue actions"
            (menuItemClick)="onIssueMenuAction($event, issue)"
          />
        </div>
      </ng-template>

      <ng-template qgEmpty>
        <p>{{ getGridListEmptyMessage(grid.query()) }}</p>
      </ng-template>
    </qg-ui-data-grid>
  </div>
</section>
