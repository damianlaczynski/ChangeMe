<section
  class="app-page-fill app-page-grid mx-auto flex min-h-0 w-full max-w-none flex-1 flex-col gap-3 overflow-hidden"
  aria-label="Issues list"
>
  <header class="grid shrink-0 gap-1.5 pb-2">
    <h1 class="m-0 text-xl font-semibold tracking-tight text-foreground md:text-2xl">
      Issues list
    </h1>
    <p class="m-0 max-w-3xl text-sm leading-normal text-foreground-2">
      Browse, filter and monitor issues.
    </p>
  </header>

  <div class="flex shrink-0 flex-wrap items-center gap-2">
    <ui-button
      text="Add issue"
      icon="add"
      variant="primary"
      [routerLink]="['/issues', 'create']"
    />
  </div>

  <div class="flex min-h-0 flex-1 flex-col gap-3 overflow-hidden">
    @if (errorMessage(); as message) {
      <ui-message-bar class="shrink-0" [title]="message" variant="danger" />
    }

    <qg-ui-data-grid
      class="flex min-h-0 flex-1 flex-col overflow-hidden"
      [grid]="grid"
      [pageSizeOptions]="[10, 25, 50]"
      [hoverable]="true"
    >
      <ng-template
        qgColumn="title"
        header="Title"
        [filter]="{ type: 'text', placeholder: 'Title…' }"
        [qgColumnOf]="rowType"
        width="220px"
        let-issue
      >
        <a class="detail-table__link" [routerLink]="['/issues', issue.id]">
          {{ issue.title }}
        </a>
      </ng-template>

      <ng-template
        qgColumn="status"
        header="Status"
        [filter]="{ type: 'enum', options: issueStatuses() }"
        [qgColumnOf]="rowType"
        width="140px"
        let-issue
      >
        <ui-tag
          [text]="getIssueStatusLabel(issue.status)"
          [variant]="getIssueStatusSeverity(issue.status)"
          appearance="outline"
        />
      </ng-template>

      <ng-template
        qgColumn="priority"
        header="Priority"
        [filter]="{ type: 'enum', options: issuePriorities() }"
        [qgColumnOf]="rowType"
        width="140px"
        let-issue
      >
        <ui-tag
          [text]="getIssuePriorityLabel(issue.priority)"
          [variant]="getIssuePrioritySeverity(issue.priority)"
          appearance="outline"
        />
      </ng-template>

      <ng-template
        qgColumn="assignedToUserId"
        header="Assigned to"
        [sortable]="false"
        [filter]="{ type: 'enum', options: assignableUserFilterOptions() }"
        [qgColumnOf]="rowType"
        width="180px"
        let-issue
      >
        <span class="detail-table__text">
          {{ issue.assignedToUserName || 'Unassigned' }}
        </span>
      </ng-template>

      <ng-template
        qgColumn="createdAt"
        header="Created at"
        [filter]="{ type: 'date' }"
        [qgColumnOf]="rowType"
        width="160px"
        let-issue
      >
        <time class="detail-table__date">
          {{ issue.createdAt | date: 'dd.MM.yyyy HH:mm' }}
        </time>
      </ng-template>

      <ng-template
        qgColumn="lastActivityAt"
        header="Last activity"
        [filter]="{ type: 'date' }"
        [qgColumnOf]="rowType"
        width="160px"
        let-issue
      >
        <time class="detail-table__date">
          {{ issue.lastActivityAt | date: 'dd.MM.yyyy HH:mm' }}
        </time>
      </ng-template>

      <ng-template
        qgColumn="actions"
        header=""
        [sortable]="false"
        [qgColumnOf]="rowType"
        width="140px"
        let-issue
      >
        <div class="flex flex-wrap items-center gap-2">
          <ui-button
            [text]="issue.watchersCount.toString()"
            [icon]="issue.isWatchedByCurrentUser ? 'alert_off' : 'alert'"
            [variant]="issue.isWatchedByCurrentUser ? 'success' : 'secondary'"
            [appearance]="issue.isWatchedByCurrentUser ? 'filled' : 'outline'"
            [loading]="isWatchPending(issue.id)"
            [uiTooltip]="getWatchTooltip(issue)"
            uiTooltipPosition="top"
            [attr.aria-label]="getWatchTooltip(issue)"
            (click)="toggleWatch(issue)"
          />
          <ui-menu
            triggerVariant="button"
            [menuItems]="getIssueMenuItems(issue)"
            icon="more_horizontal"
            ariaLabel="Issue actions"
            (menuItemClick)="onIssueMenuAction($event, issue)"
          />
        </div>
      </ng-template>

      <ng-template qgEmpty>
        <p class="detail-tab-empty">{{ getGridListEmptyMessage(grid.query()) }}</p>
      </ng-template>
    </qg-ui-data-grid>
  </div>
</section>
