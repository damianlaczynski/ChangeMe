<section class="app-page app-page--form app-page--wide" aria-label="Create issue">
  <header class="app-page__header">
    <h1 class="app-page__title">Create Issue</h1>
    <p class="app-page__subtitle">
      Create a new issue and move to its details page after saving
    </p>
  </header>

  <div class="app-page__toolbar">
    <app-back-button label="Back to issues list" [route]="['/issues']" />
  </div>

  <div class="app-page__body app-page__body--form">
    <form class="app-form-workspace" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="app-form-workspace__scroll app-stack-md">
        <ui-accordion appDefaultExpanded label="Issue details" icon="document">
          <div class="app-stack-md">
            <ui-text
              label="Title"
              placeholder="e.g. Login button disabled on mobile"
              [formControl]="form.controls.title"
              [required]="true"
              [errorText]="
                fieldError(form.controls.title, IssueFieldErrors.title, submitted())
              "
            />

            <ui-textarea
              label="Description"
              placeholder="What is wrong, who is affected, and what should happen instead..."
              [rows]="5"
              [formControl]="form.controls.description"
              [required]="true"
              [errorText]="
                fieldError(
                  form.controls.description,
                  IssueFieldErrors.description,
                  submitted()
                )
              "
            />

            <div class="app-form__grid">
              <ui-dropdown
                label="Status"
                [items]="statusItems()"
                [formControl]="form.controls.status"
              />
              <ui-dropdown
                label="Priority"
                [items]="priorityItems()"
                [formControl]="form.controls.priority"
              />
              <ui-dropdown
                label="Assigned to"
                placeholder="Unassigned"
                [items]="assignableUserItems()"
                [clearable]="true"
                [formControl]="form.controls.assignedToUserId"
              />
            </div>

            <ui-checkbox
              label="Watch after create"
              labelPosition="after"
              [formControl]="form.controls.watchAfterCreate"
            />
          </div>
        </ui-accordion>

        <ui-accordion
          appDefaultExpanded
          label="Acceptance criteria"
          icon="checkmark_circle"
        >
          <div class="app-stack-md">
            @for (
              criterion of form.controls.acceptanceCriteria.controls;
              track $index
            ) {
              <div class="app-criterion-card app-stack-sm">
                <div class="app-row app-row--between">
                  <span class="app-section-title">Criterion {{ $index + 1 }}</span>
                  <ui-button
                    type="button"
                    text="Remove"
                    icon="delete"
                    variant="danger"
                    appearance="outline"
                    (click)="removeAcceptanceCriterion($index)"
                  />
                </div>
                <ui-textarea
                  [label]="'Acceptance criterion ' + ($index + 1)"
                  placeholder="e.g. User can sign in with valid credentials on mobile"
                  [rows]="3"
                  [formControl]="criterion.controls.content"
                  [required]="true"
                  [errorText]="
                    fieldError(
                      criterion.controls.content,
                      IssueFieldErrors.acceptanceCriterion,
                      submitted()
                    )
                  "
                />
              </div>
            }

            <ui-button
              type="button"
              text="Add acceptance criterion"
              icon="add"
              variant="secondary"
              appearance="outline"
              (click)="addAcceptanceCriterion()"
            />
          </div>
        </ui-accordion>

        @if (submitError()) {
          <ui-message-bar [title]="submitError()!" variant="danger" />
        }
      </div>

      <footer class="app-form-workspace__footer">
        <div class="app-form__actions">
          <ui-button
            text="Cancel"
            variant="secondary"
            appearance="outline"
            (click)="cancel()"
          />
          <ui-button
            type="submit"
            [text]="isSubmitting() ? 'Creating issue...' : 'Create issue'"
            icon="checkmark"
            variant="primary"
            [loading]="isSubmitting()"
          />
        </div>
      </footer>
    </form>
  </div>
</section>
