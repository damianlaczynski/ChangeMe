<section
  class="app-page-fill mx-auto flex min-h-0 w-full max-w-none flex-1 flex-col gap-3 overflow-hidden"
  aria-label="Create issue"
>
  <header class="grid shrink-0 gap-1.5 pb-2">
    <h1 class="m-0 text-xl font-semibold tracking-tight text-foreground md:text-2xl">
      Create Issue
    </h1>
    <p class="m-0 max-w-3xl text-sm leading-normal text-foreground-2">
      Create a new issue and move to its details page after saving
    </p>
  </header>

  <div class="flex shrink-0 flex-wrap items-center gap-2">
    <app-back-button label="Back to issues list" [route]="['/issues']" />
  </div>

  <div class="flex min-h-0 flex-1 flex-col">
    <form
      class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-xl bg-surface-2"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >
      <div class="flex min-h-0 flex-1 flex-col gap-4 overflow-y-auto p-4 md:p-6">
        <ui-accordion appDefaultExpanded label="Issue details" icon="document">
          <div class="flex flex-col gap-4">
            <ui-text
              label="Title"
              placeholder="e.g. Login button disabled on mobile"
              [formControl]="form.controls.title"
              [required]="true"
              [errorText]="
                fieldError(form.controls.title, IssueFieldErrors.title, submitted())
              "
            />

            <ui-textarea
              label="Description"
              placeholder="What is wrong, who is affected, and what should happen instead..."
              [rows]="5"
              [formControl]="form.controls.description"
              [required]="true"
              [errorText]="
                fieldError(
                  form.controls.description,
                  IssueFieldErrors.description,
                  submitted()
                )
              "
            />

            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
              <ui-select
                label="Status"
                [items]="statusItems()"
                [formControl]="form.controls.status"
              />
              <ui-select
                label="Priority"
                [items]="priorityItems()"
                [formControl]="form.controls.priority"
              />
              <ui-select
                label="Assigned to"
                placeholder="Unassigned"
                [items]="assignableUserItems()"
                [clearable]="true"
                [formControl]="form.controls.assignedToUserId"
              />
            </div>

            <ui-checkbox
              label="Watch after create"
              labelPosition="after"
              [formControl]="form.controls.watchAfterCreate"
            />
          </div>
        </ui-accordion>

        <ui-accordion
          appDefaultExpanded
          label="Acceptance criteria"
          icon="checkmark_circle"
        >
          <div class="flex flex-col gap-4">
            @for (
              criterion of form.controls.acceptanceCriteria.controls;
              track $index
            ) {
              <div
                class="flex flex-col gap-2 rounded-lg border border-stroke bg-surface-2 p-4"
              >
                <div class="flex flex-wrap items-center justify-between gap-2">
                  <span class="m-0 text-[0.9375rem] font-semibold">
                    Criterion {{ $index + 1 }}
                  </span>
                  <ui-button
                    type="button"
                    text="Remove"
                    icon="delete"
                    variant="danger"
                    appearance="outline"
                    (click)="removeAcceptanceCriterion($index)"
                  />
                </div>
                <ui-textarea
                  [label]="'Acceptance criterion ' + ($index + 1)"
                  placeholder="e.g. User can sign in with valid credentials on mobile"
                  [rows]="3"
                  [formControl]="criterion.controls.content"
                  [required]="true"
                  [errorText]="
                    fieldError(
                      criterion.controls.content,
                      IssueFieldErrors.acceptanceCriterion,
                      submitted()
                    )
                  "
                />
              </div>
            }

            <ui-button
              type="button"
              text="Add acceptance criterion"
              icon="add"
              variant="secondary"
              appearance="outline"
              (click)="addAcceptanceCriterion()"
            />
          </div>
        </ui-accordion>

        @if (submitError()) {
          <ui-message-bar [title]="submitError()!" variant="danger" />
        }
      </div>

      <footer
        class="flex shrink-0 items-center justify-end gap-2 border-t border-stroke bg-surface-2 px-4 py-3.5 md:px-6"
      >
        <div class="flex w-full flex-wrap items-center justify-end gap-2">
          <ui-button
            text="Cancel"
            variant="secondary"
            appearance="outline"
            (click)="cancel()"
          />
          <ui-button
            type="submit"
            [text]="isSubmitting() ? 'Creating issue...' : 'Create issue'"
            icon="checkmark"
            variant="primary"
            [loading]="isSubmitting()"
          />
        </div>
      </footer>
    </form>
  </div>
</section>
