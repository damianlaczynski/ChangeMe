<p-dialog
  header="Edit weekly pattern"
  [visible]="visible()"
  (visibleChange)="!$event && onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(48rem, calc(100vw - 2rem))' }"
  (onHide)="onHide()"
>
  <form class="flex flex-col gap-3" [formGroup]="form" (ngSubmit)="save()">
    @if (submitError()) {
      <p-message severity="error">{{ submitError() }}</p-message>
    }

    <p-table [value]="dayRows.controls" formArrayName="days">
      <ng-template #header>
        <tr>
          <th>Day</th>
          <th>Enabled</th>
          <th>Start time</th>
          <th>End time</th>
          <th>Status</th>
        </tr>
      </ng-template>
      <ng-template #body let-row let-index="rowIndex">
        <tr [formGroupName]="index">
          <td>{{ weekdayOptions[index].label }}</td>
          <td>
            <p-checkbox formControlName="enabled" [binary]="true" />
          </td>
          <td>
            <input
              pInputText
              formControlName="startTime"
              [disabled]="!row.controls.enabled.value"
            />
          </td>
          <td>
            <input
              pInputText
              formControlName="endTime"
              [disabled]="!row.controls.enabled.value"
            />
          </td>
          <td>
            <p-select
              formControlName="status"
              [options]="recurringAvailabilityStatusOptions"
              optionLabel="label"
              optionValue="value"
              appendTo="body"
              [disabled]="!row.controls.enabled.value"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>

    <div class="flex flex-wrap justify-end gap-2">
      <p-button
        label="Cancel"
        severity="secondary"
        [outlined]="true"
        type="button"
        (onClick)="onHide()"
      />
      <p-button
        label="Save pattern"
        icon="pi pi-check"
        type="submit"
        [loading]="isSubmitting()"
      />
    </div>
  </form>
</p-dialog>
