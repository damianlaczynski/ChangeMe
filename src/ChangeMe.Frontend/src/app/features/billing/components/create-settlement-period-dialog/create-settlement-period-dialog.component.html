<p-dialog
  header="Create period"
  [visible]="visible()"
  (visibleChange)="!$event && onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(28rem, calc(100vw - 2rem))' }"
  (onHide)="onHide()"
>
  <form class="flex flex-col gap-3" [formGroup]="form" (ngSubmit)="save()">
    @if (submitError()) {
      <p-message severity="error">{{ submitError() }}</p-message>
    }

    <div class="flex flex-col gap-1.5">
      <label for="settlementYear">Year</label>
      <p-inputnumber
        inputId="settlementYear"
        formControlName="year"
        [min]="yearRange.min"
        [max]="yearRange.max"
        [useGrouping]="false"
        class="w-full"
      />
    </div>

    <div class="flex flex-col gap-1.5">
      <label for="settlementMonth">Month</label>
      <p-select
        inputId="settlementMonth"
        formControlName="month"
        [options]="settlementMonthOptions"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
        class="w-full"
      />
    </div>

    <div class="flex flex-wrap justify-end gap-2">
      <p-button
        label="Cancel"
        severity="secondary"
        [outlined]="true"
        type="button"
        (onClick)="onHide()"
      />
      <p-button
        label="Create"
        icon="pi pi-check"
        type="submit"
        [loading]="isSubmitting()"
      />
    </div>
  </form>
</p-dialog>
