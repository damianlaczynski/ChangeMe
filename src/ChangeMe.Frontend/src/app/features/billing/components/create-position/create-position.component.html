<p-card class="mb-4" header="Create position">
  <div class="mb-4">
    <app-back-button label="Back to positions" [route]="['/billing/positions']" />
  </div>

  <form class="p-fluid flex flex-col gap-4" [formGroup]="form" (ngSubmit)="onSubmit()">
    <p-panel header="Position details" [toggleable]="true">
      <div class="flex flex-col gap-1.5">
        <label for="name">Name</label>
        <input id="name" type="text" pInputText [formControl]="form.controls.name" />
      </div>
      <div class="mt-4 flex flex-col gap-1.5">
        <label for="department">Department</label>
        <input
          id="department"
          type="text"
          pInputText
          [formControl]="form.controls.department"
        />
      </div>
      <div class="mt-4 flex flex-col gap-1.5">
        <label for="description">Description</label>
        <textarea
          id="description"
          pTextarea
          rows="3"
          [formControl]="form.controls.description"
        ></textarea>
      </div>
      <div class="mt-4 flex items-center gap-2">
        <p-toggleswitch inputId="isActive" [formControl]="form.controls.isActive" />
        <label for="isActive">Active</label>
      </div>
    </p-panel>

    @if (submitError()) {
      <p-message severity="error">{{ submitError() }}</p-message>
    }

    <div class="flex flex-wrap justify-end gap-2">
      <p-button
        label="Cancel"
        severity="secondary"
        [outlined]="true"
        (onClick)="cancel()"
      />
      <p-button
        type="submit"
        label="Save"
        icon="pi pi-check"
        [loading]="isSubmitting()"
      />
    </div>
  </form>
</p-card>
