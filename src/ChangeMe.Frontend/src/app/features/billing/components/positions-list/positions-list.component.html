<p-card class="mb-4" header="Positions">
  <form class="p-fluid" [formGroup]="filtersForm" (ngSubmit)="applyFilters()">
    <div class="mb-4 flex flex-wrap items-center gap-2">
      <input
        id="searchText"
        type="text"
        pInputText
        [formControl]="filtersForm.controls.searchText"
        placeholder="Search positions..."
        class="min-w-0 flex-1"
      />
      <p-button type="submit" label="Search" icon="pi pi-search" />
      @if (canManagePositions) {
        <p-button
          label="Add position"
          icon="pi pi-plus"
          [routerLink]="['/billing/positions/create']"
        />
      }
    </div>
  </form>

  @if (errorMessage()) {
    <p-message severity="error" class="mb-4">{{ errorMessage() }}</p-message>
  }

  <p-menu #positionActionsMenu [model]="positionActionItems()" [popup]="true" />

  <p-table
    [value]="positions()"
    [loading]="isLoading() && !hasLoaded()"
    [sortField]="query().sortField"
    [sortOrder]="query().ascending ? 1 : -1"
    [customSort]="true"
    (onSort)="onTableSort($event)"
    stripedRows
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="Name">
          <div class="flex items-center gap-2">
            Name
            <p-sortIcon field="Name" />
          </div>
        </th>
        <th pSortableColumn="Department">
          <div class="flex items-center gap-2">
            Department
            <p-sortIcon field="Department" />
          </div>
        </th>
        <th pSortableColumn="Active">
          <div class="flex items-center gap-2">
            Active
            <p-sortIcon field="Active" />
          </div>
        </th>
        <th pSortableColumn="Contracts">
          <div class="flex items-center gap-2">
            Contracts
            <p-sortIcon field="Contracts" />
          </div>
        </th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-position>
      <tr>
        <td>
          <a
            class="text-primary font-medium hover:underline"
            [routerLink]="['/billing/positions', position.id]"
          >
            {{ position.name }}
          </a>
        </td>
        <td>{{ position.department || BillingMessages.departmentEmpty }}</td>
        <td>
          <p-tag
            [value]="getPositionActiveLabel(position.isActive)"
            [severity]="getPositionActiveSeverity(position.isActive)"
          />
        </td>
        <td>{{ position.contractCount }}</td>
        <td>
          <p-button
            type="button"
            icon="pi pi-ellipsis-v"
            severity="secondary"
            [text]="true"
            size="small"
            [attr.aria-label]="'Actions for ' + position.name"
            (onClick)="openPositionActionsMenu($event, position)"
          />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="5">
          <p class="text-muted-color m-0 py-4 text-center">
            {{ BillingMessages.noPositions }}
          </p>
        </td>
      </tr>
    </ng-template>
  </p-table>

  @if (hasLoaded()) {
    <p-paginator
      [rows]="pagination()?.pageSize ?? 10"
      [totalRecords]="pagination()?.totalCount ?? 0"
      [first]="((pagination()?.currentPage ?? 1) - 1) * (pagination()?.pageSize ?? 10)"
      (onPageChange)="onPageChange($event)"
    />
  }
</p-card>
