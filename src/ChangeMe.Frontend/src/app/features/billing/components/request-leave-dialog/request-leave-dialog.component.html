<p-dialog
  [header]="isEditMode() ? 'Edit leave request' : 'Request leave'"
  [visible]="visible()"
  (visibleChange)="!$event && onHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: 'min(32rem, calc(100vw - 2rem))' }"
  (onHide)="onHide()"
>
  <form class="flex flex-col gap-3" [formGroup]="form">
    @if (submitError()) {
      <p-message severity="error">{{ submitError() }}</p-message>
    }

    <div class="flex flex-col gap-1.5">
      <label for="leaveType">Leave type</label>
      <p-select
        inputId="leaveType"
        appendTo="body"
        formControlName="leaveTypeId"
        [options]="leaveTypes()"
        optionLabel="name"
        optionValue="id"
        placeholder="Select leave type"
      />
    </div>

    <div class="grid gap-3 md:grid-cols-2">
      <div class="flex flex-col gap-1.5">
        <label for="leaveStartDate">Start date</label>
        <p-datepicker
          inputId="leaveStartDate"
          appendTo="body"
          formControlName="startDate"
          dateFormat="dd.mm.yy"
          [showIcon]="true"
        />
      </div>
      <div class="flex flex-col gap-1.5">
        <label for="leaveEndDate">End date</label>
        <p-datepicker
          inputId="leaveEndDate"
          appendTo="body"
          formControlName="endDate"
          dateFormat="dd.mm.yy"
          [showIcon]="true"
        />
      </div>
    </div>

    @if (showDayPortion()) {
      <div class="flex flex-col gap-1.5">
        <label for="leaveDayPortion">Day portion</label>
        <p-select
          inputId="leaveDayPortion"
          appendTo="body"
          formControlName="dayPortion"
          [options]="leaveDayPortionOptions"
          optionLabel="label"
          optionValue="value"
        />
      </div>
    }

    <div class="flex flex-col gap-1.5">
      <label for="leaveReason">Reason</label>
      <textarea
        pTextarea
        id="leaveReason"
        rows="3"
        formControlName="reason"
        [maxlength]="constraints.REASON_MAX_LENGTH"
      ></textarea>
    </div>

    <div class="flex flex-wrap justify-end gap-2">
      <p-button
        label="Cancel"
        severity="secondary"
        [outlined]="true"
        type="button"
        (onClick)="onHide()"
      />
      <p-button
        label="Save as draft"
        severity="secondary"
        [outlined]="true"
        type="button"
        [loading]="isSubmitting()"
        (onClick)="save(false)"
      />
      <p-button
        label="Submit"
        icon="pi pi-check"
        type="button"
        [loading]="isSubmitting()"
        (onClick)="save(true)"
      />
    </div>
  </form>
</p-dialog>
